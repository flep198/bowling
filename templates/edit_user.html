{% extends "base.html" %}
{% block content %}
<div style="max-width:450px;margin:0 auto;">
  <h1>Edit User</h1>
  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" name="username" id="username" value="{{ edit_user.username }}" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">New password <span class="muted" style="font-weight:400;padding:0;font-size:0.75rem;">(leave blank to keep current)</span></label>
        <input type="password" name="password" id="password">
      </div>
      <div class="form-group">
        <label for="confirm_password">Confirm new password</label>
        <input type="password" name="confirm_password" id="confirm_password">
      </div>
      <div class="form-group">
        <label>
          <input type="checkbox" name="is_admin" {% if edit_user.is_admin %}checked{% endif %} style="accent-color:#f5c842;width:auto;">
          Admin privileges
        </label>
      </div>
      <button type="submit" class="btn btn-primary">Save Changes</button>
    </form>
    <p style="margin-top:1rem;text-align:center;">
      <a href="{{ url_for('admin_users') }}" style="color:#8a9db0;font-size:0.85rem;">← Back to users</a>
    </p>
  </div>
</div>
{% endblock %}
