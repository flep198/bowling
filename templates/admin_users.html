{% extends "base.html" %}
{% block content %}
<div class="dash-header">
  <h1>Manage Users</h1>
  <a href="{{ url_for('register') }}" class="btn-sm">+ New Player</a>
</div>

<div class="leaderboard">
  <table>
    <thead>
      <tr>
        <th>Username</th>
        <th>Admin</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      {% for u in users %}
      <tr class="{% if u.id == current_user.id %}me{% endif %}">
        <td class="name">{{ u.username }}</td>
        <td>{% if u.is_admin %}<span class="badge">Admin</span>{% endif %}</td>
        <td>
          <a href="{{ url_for('admin_edit_user', user_id=u.id) }}" class="btn-sm">Edit</a>
          {% if u.id != current_user.id %}
            <a href="{{ url_for('admin_delete_user', user_id=u.id) }}" class="btn-sm btn-danger">Delete</a>
          {% endif %}
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
